<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kokonoe</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0a0f0c);
    --fg: var(--tg-theme-text-color, #d6e4dc);
    --muted: var(--tg-theme-hint-color, #5a7568);
    --accent: var(--tg-theme-button-color, #6affad);
    --card: var(--tg-theme-secondary-bg-color, #121a16);
    --border: #1f2e25;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    min-height: 100vh;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
  .full { grid-column: 1 / -1; }
  .monolog { font-style: italic; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .err {
    background: #2a1517; border: 1px solid #5a2a2e; color: #ffb3b8;
    padding: 12px; border-radius: 10px; font-size: 13px;
    margin-bottom: 12px;
  }
  .btn {
    background: var(--accent); color: #03110a;
    border: 0; border-radius: 10px;
    padding: 10px 14px; font-weight: 600; cursor: pointer;
    width: 100%;
  }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  .pill {
    display: inline-block; padding: 2px 8px;
    background: #1a2820; border-radius: 999px;
    font-size: 11px; color: var(--muted);
  }
</style>
</head>
<body>
  <h1>◈ Kokonoe</h1>
  <div class="sub" id="sub">завантаження...</div>

  <div id="err"></div>

  <div class="grid" id="grid" style="display:none">
    <div class="card">
      <div class="label">Емоція</div>
      <div class="value" id="emotion">—</div>
    </div>
    <div class="card">
      <div class="label">Bond</div>
      <div class="value" id="bond">—</div>
    </div>
    <div class="card">
      <div class="label">Connection</div>
      <div class="value" id="conn">—</div>
    </div>
    <div class="card">
      <div class="label">Mood score</div>
      <div class="value" id="score">—</div>
    </div>
    <div class="card full">
      <div class="label">Внутрішній монолог</div>
      <div class="monolog" id="monolog">—</div>
    </div>
    <div class="card full">
      <div class="label">Scheduler</div>
      <div class="value"><span id="pending">0</span> <span class="pill">pending</span></div>
    </div>
  </div>

  <div class="row">
    <button class="btn" id="refresh">Оновити</button>
  </div>

<script>
const tg = window.Telegram?.WebApp;
tg?.expand();
tg?.ready();

const initData = tg?.initData || "";
const sub = document.getElementById("sub");
const errEl = document.getElementById("err");
const grid = document.getElementById("grid");

async function load() {
  errEl.textContent = "";
  if (!initData) {
    showErr("Немає initData. Відкрий через бота, не напряму.");
    return;
  }
  try {
    const r = await fetch("/api/state", { headers: { "X-Tg-InitData": initData }});
    const data = await r.json();
    if (!r.ok) { showErr("API помилка: " + (data.reason || data.error || r.status)); return; }
    grid.style.display = "grid";
    document.getElementById("emotion").textContent = data.emotion ?? "—";
    document.getElementById("bond").textContent    = data.bond ?? "—";
    document.getElementById("conn").textContent    = (data.conn ?? 0).toFixed(2);
    document.getElementById("score").textContent   = (data.score ?? 0).toFixed(2);
    document.getElementById("monolog").textContent = data.monolog ?? "—";
    document.getElementById("pending").textContent = data.pending ?? 0;
    sub.textContent = "оновлено " + new Date(data.ts).toLocaleTimeString("uk-UA");
  } catch (e) {
    showErr("Не зміг достукатись: " + e.message);
  }
}

function showErr(msg) {
  errEl.innerHTML = '<div class="err">' + msg + '</div>';
  sub.textContent = "помилка";
}

document.getElementById("refresh").addEventListener("click", load);
load();
</script>
</body>
</html>
