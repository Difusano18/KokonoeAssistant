name: .NET quality gate

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore KokonoeAssistant.sln

      - name: Build Debug
        run: dotnet build KokonoeAssistant.sln --configuration Debug --no-restore /p:EnableKokonoePreBuildKill=false

      - name: Test Debug
        run: dotnet test KokonoeAssistant.sln --configuration Debug --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Build Release
        run: dotnet build KokonoeAssistant.sln --configuration Release --no-restore /p:EnableKokonoePreBuildKill=false

      - name: Test Release
        run: dotnet test KokonoeAssistant.sln --configuration Release --no-build --logger trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
